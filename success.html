<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying Device</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    height:100vh;
    width:100%;
    background: linear-gradient(to bottom, #141130, #000000);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* ================= BUTTON STYLE ================= */

.bot-button{
    background-color: #00FFA3;
    color: #010A00;
    border: none;
    letter-spacing:2px;
    font-size: 16px;
    width:350px;
    height:70px;
    font-weight: bold;
    cursor:pointer;
    border-radius: 12px;
    box-shadow:0 0 10px #00FFA3;
    text-transform: uppercase;
    margin-top:25px;
    transition: 0.3s ease;
    margin-top: 40px; /* increase = move down */
}
}

.bot-button:hover{
    transform:scale(1.05);
}

/* ================= TOP CARD ================= */

.top-card{
    width:100%;
    height:9%;
    background-color:#151422;
    border:1px solid #2f2c4a;
    position:fixed;
    top:0;
    left:0;
    right:0;
    display:flex;
    align-items:center;
    padding:0 20px;
    z-index:1000;
}

.top-bar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.profile-left img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
}

.user-info{
    display:flex;
    flex-direction:column;
    font-size:13px;
    text-align:left;
}

.status{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 18px;
    border-radius:50px;
    background:#162429;
    border:1px solid #2E4344;
    color:#6AC67F;
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
}

.status::before{
    content:"";
    width:7px;
    height:7px;
    border-radius:50%;
    background:#1EC764;
    animation: softBlink 2.5s infinite ease-in-out;
}


.containerr{
    margin-top:160px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= MAIN CARD ================= */

.cardd{
    width:500px;
    height:600px;
    background: linear-gradient(to bottom, #1A1830, #060606);
    border-radius:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.6);
    display:flex;
    border:1px solid #1F1E26;
    justify-content:center;
    align-items:center;
}

.container{
    width:500px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ================= VERIFY TICK ================= */

.verify-wrapper{
    position:relative;
    width:260px;
    height:260px;
    margin-bottom:50px;
}

.verify-wrapper svg,
.glow-layer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

.outermost{ width:235px; height:235px; }
.outer{ width:200px; height:200px; }
.inner{ width:95px; height:95px; }

.glow-layer{
    width:210px;
    height:210px;
    border-radius:50%;
    background: radial-gradient(circle,
        rgba(6,247,156,0.6) 0%,
        rgba(6,247,156,0.45) 20%,
        rgba(6,247,156,0.25) 40%,
        rgba(6,247,156,0.08) 60%,
        transparent 85%);
    z-index:0;
}

/* ================= TEXT ================= */

h1{
    font-size:200%;
    font-weight:600;
    color:#0CFBA4;
    margin-bottom:15px;
}

.subtitle{
    font-size:15px;
    color:#8F8F99;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="top-card">
    <div class="top-bar">
        <div class="profile-left">
            <img id="profilePic">
            <div class="user-info">
                <strong id="profileName"></strong>
                <small id="profileId"></small>
            </div>
        </div>
        <div class="status">ACTIVE</div>
    </div>
</div>

<div class="containerr">
    <div class="cardd">
        <div class="container">

            <div class="verify-wrapper">
                <!-- SVG animation remains unchanged -->
                <svg class="outermost" viewBox="0 0 400 400">
                    <circle cx="200" cy="200" r="180"
                        fill="none"
                        stroke="#3ED9A7"
                        stroke-width="6"/>
                </svg>

                <svg class="outer" viewBox="0 0 400 400">
                    <circle cx="200" cy="200" r="180"
                        fill="none"
                        stroke="#297E6C"
                        stroke-width="8"/>
                </svg>

                <div class="glow-layer"></div>

                <svg class="inner" viewBox="0 0 400 400">
                    <circle cx="200" cy="200" r="155"
                        fill="#1E5652"
                        stroke="#06F79C"
                        stroke-width="45"/>

                    <path
                        d="M155 205
                           Q170 225 190 245
                           Q220 210 260 170"
                        fill="none"
                        stroke="#07FFA8"
                        stroke-width="35"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>
            </div>

            <h1><b>Verified Successfully</b></h1>

            <div class="subtitle">
              You're Verified Successfully, you can use <br> our bot now.
            </div>

            <!-- ✅ BUTTON ADDED BELOW SUBTITLE -->
            <button class="bot-button">CONTINUE TO BOT</button>

        </div>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;

if(user){
    document.getElementById("profileName").innerText =
        user.first_name + (user.last_name ? " " + user.last_name : "");
    document.getElementById("profileId").innerText =
        "ID: " + user.id;

    if(user.photo_url){
        document.getElementById("profilePic").src = user.photo_url;
    }
}
</script>

</body>
</html>
