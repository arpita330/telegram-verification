<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Successful</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
height:100vh;
width:100%;
background:linear-gradient(135deg,#141130 0%,#000000 100%);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:#fff;
overflow:hidden;
}

/* HEADER */

.top-card{
width:100%;
height:70px;
background:#151422;
border-bottom:1px solid #2f2c4a;
display:flex;
align-items:center;
justify-content:center;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.top-bar{
width:92%;
display:flex;
justify-content:space-between;
align-items:center;
}

.profile-left{
display:flex;
align-items:center;
gap:12px;
}

.profile-left img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
background:#222;
}

.user-info{
display:flex;
flex-direction:column;
font-size:13px;
}

.status{
display:flex;
align-items:center;
gap:8px;
padding:6px 18px;
border-radius:50px;
background:#162429;
border:1px solid #2E4344;
color:#6AC67F;
font-size:13px;
font-weight:600;
letter-spacing:1px;
}

.status::before{
content:"";
width:7px;
height:7px;
border-radius:50%;
background:#1EC764;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

/* MAIN AREA */

.main{
flex:1;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding-top:70px;
}

/* CARD */

.cardd{
width:720px;
height:420px;
background:linear-gradient(to bottom,#18162B,#000000);
border-radius:28px;
box-shadow:0 4px 20px rgba(0,0,0,0.6);
border:1px solid #29273C;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

/* VERIFY ICON */

.verify-wrapper{
position:relative;
width:200px;
height:200px;
margin-bottom:30px;
}

.verify-wrapper svg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.glow-layer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:170px;
height:170px;
border-radius:50%;
background:radial-gradient(circle,
rgba(6,247,156,0.6) 0%,
rgba(6,247,156,0.4) 30%,
rgba(6,247,156,0.15) 50%,
transparent 70%);
}

/* TEXT */

h1{
font-size:28px;
color:#0CFBA4;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#bfbfbf;
margin-bottom:30px;
line-height:1.4;
}

/* BUTTON */

.bot-button{
background:#00FFA3;
color:#010A00;
border:none;
font-size:15px;
width:260px;
height:55px;
font-weight:bold;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px #00FFA3;
letter-spacing:2px;
text-transform:uppercase;
transition:0.3s;
}

.bot-button:hover{
transform:scale(1.05);
}

/* FOOTER */

.footer{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
font-size:13px;
letter-spacing:1px;
color:#ffffff;
}

.footer span{
color:#00c3ff;
font-weight:600;
}

</style>
</head>

<body>

<div class="top-card">
<div class="top-bar">

<div class="profile-left">
<img id="profilePic">
<div class="user-info">
<strong id="profileName"></strong>
<small id="profileId"></small>
</div>
</div>

<div class="status">ACTIVE</div>

</div>
</div>

<div class="main">

<div class="cardd">

<div class="container">

<div class="verify-wrapper">

<svg width="200" height="200" viewBox="0 0 400 400">
<circle cx="200" cy="200" r="180"
fill="none"
stroke="#3ED9A7"
stroke-width="6"/>
</svg>

<div class="glow-layer"></div>

<svg width="120" height="120" viewBox="0 0 400 400">
<circle cx="200" cy="200" r="155"
fill="#1E5652"
stroke="#06F79C"
stroke-width="45"/>

<path
d="M155 205
Q170 225 190 245
Q220 210 260 170"
fill="none"
stroke="#07FFA8"
stroke-width="35"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<h1>Verified Successfully</h1>

<div class="subtitle">
You're verified successfully.<br>
You can now use our bot.
</div>

<button class="bot-button">
CONTINUE TO BOT
</button>

</div>

</div>

</div>

<div class="footer">
Powered by <span>RohitXEgo</span>
</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(user){

document.getElementById("profileName").innerText =
user.first_name + (user.last_name ? " " + user.last_name : "")

document.getElementById("profileId").innerText =
"ID: " + user.id

if(user.photo_url){
document.getElementById("profilePic").src = user.photo_url
}

}

</script>

</body>
</html>
