<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Already Verified</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
height:100vh;
width:100%;
background:linear-gradient(135deg,#141130 0%,#000000 100%);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:#fff;
overflow:hidden;
}

/* HEADER */

.top-card{
width:100%;
height:70px;
background:#151422;
border-bottom:1px solid #2f2c4a;
display:flex;
align-items:center;
justify-content:center;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.top-bar{
width:92%;
display:flex;
justify-content:space-between;
align-items:center;
}

.profile-left{
display:flex;
align-items:center;
gap:12px;
}

.profile-left img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
background:#222;
}

.user-info{
display:flex;
flex-direction:column;
font-size:13px;
}

.status{
display:flex;
align-items:center;
gap:8px;
padding:6px 18px;
border-radius:50px;
background:#162429;
border:1px solid #2E4344;
color:#6AC67F;
font-size:13px;
font-weight:600;
letter-spacing:1px;
}

/* MAIN */

.main{
flex:1;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding-top:70px;
}

/* CARD */

.cardd{
width:720px;
height:420px;
background:linear-gradient(to bottom,#18162B,#000000);
border-radius:28px;
box-shadow:0 4px 20px rgba(0,0,0,0.6);
border:1px solid #29273C;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

/* ICON */

.verify-icon{
width:120px;
height:120px;
border-radius:50%;
background:#2C62C8;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
box-shadow:0 0 25px rgba(80,120,255,.6);
}

.verify-icon img{
width:65px;
}

/* TEXT */

h1{
font-size:28px;
color:#86A3FF;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#bfbfbf;
margin-bottom:30px;
line-height:1.4;
}

/* BUTTON */

.bot-button{
background:#3B82F6;
color:#fff;
border:none;
font-size:15px;
width:260px;
height:55px;
font-weight:bold;
cursor:pointer;
border-radius:10px;
box-shadow:0 0 10px #3B82F6;
letter-spacing:2px;
text-transform:uppercase;
transition:0.3s;
}

.bot-button:hover{
transform:scale(1.05);
}

/* FOOTER */

.footer{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
font-size:13px;
letter-spacing:1px;
color:#ffffff;
}

.footer span{
color:#00c3ff;
font-weight:600;
}

</style>
</head>

<body>

<div class="top-card">
<div class="top-bar">

<div class="profile-left">
<img id="profilePic">
<div class="user-info">
<strong id="profileName"></strong>
<small id="profileId"></small>
</div>
</div>

<div class="status">ACTIVE</div>

</div>
</div>

<div class="main">

<div class="cardd">

<div class="container">

<div class="verify-icon">
<img src="https://i.ibb.co/r2qC01gR/20260228-183405.png">
</div>

<h1>Already Verified</h1>

<div class="subtitle">
Your account is already verified.<br>
You can continue using the bot.
</div>

<button class="bot-button" id="continueBtn">
CONTINUE TO BOT
</button>

</div>

</div>

</div>

<div class="footer">
Powered by <span>ROHITxEGO</span>
</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(user){

document.getElementById("profileName").innerText =
user.first_name + (user.last_name ? " " + user.last_name : "")

document.getElementById("profileId").innerText =
"ID: " + user.id

if(user.photo_url){
document.getElementById("profilePic").src = user.photo_url
}

}

document.getElementById("continueBtn").onclick = function(){
tg.close()
}

</script>

</body>
</html>
